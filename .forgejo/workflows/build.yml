name: Build
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: codeberg-medium

    strategy:
      matrix:
        goos: [linux, freebsd, openbsd]
        goarch: [amd64, arm64, 386]
        exclude:
          - goos: freebsd
            goarch: 386
          - goos: openbsd
            goarch: 386

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      # Fyne requires graphics libraries — native linux/amd64 only
      - name: Install system dependencies
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc pkg-config \
            libgl1-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxxf86vm-dev

      - name: Download dependencies
        run: go mod download

      # Run linter and tests once (native build only)
      - name: Run linter
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

      - name: Run tests
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        env:
          CGO_ENABLED: 1
        run: go test -v -race -coverprofile=coverage.out ./...

      # Native build: linux/amd64 with GUI (CGO enabled)
      - name: Build (linux/amd64 + GUI)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          mkdir -p build
          go build \
            -ldflags="-s -w -X main.Version=${{ github.sha }}" \
            -o build/svman-linux-amd64 .

      # Cross-compile: no GUI (CGO disabled, build tag tui_only)
      - name: Build (cross-compile, TUI only)
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'amd64')"
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build \
            -tags tui_only \
            -ldflags="-s -w -X main.Version=${{ github.sha }}" \
            -o build/svman-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifacts
        uses: forgejo-actions/upload-artifact@v4
        with:
          name: svman-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/svman-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7