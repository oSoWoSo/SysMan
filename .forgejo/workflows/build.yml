name: Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: codeberg-medium

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Install CGO dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Download dependencies
        run: go mod download

      - name: Build svman (GUI+TUI)
        run: |
          mkdir -p build
          go build \
            -ldflags="-s -w -X codeberg.org/oSoWoSo/svman/plugin.Version=${{ github.sha }}" \
            -o build/svman .

      - name: Build svman-tui (TUI-only, CGO-free)
        env:
          CGO_ENABLED: 0
        run: |
          go build -tags tui_only \
            -ldflags="-s -w -X codeberg.org/oSoWoSo/svman/plugin.Version=${{ github.sha }}" \
            -o build/svman-tui ./cmd/svman-tui/

      - name: Build sysmanager
        run: |
          go build \
            -ldflags="-s -w -X codeberg.org/oSoWoSo/svman/plugin.Version=${{ github.sha }}" \
            -o build/sysmanager ./cmd/sysmanager/

      - name: Build testplugin
        run: go build -o build/testplugin ./cmd/testplugin/
