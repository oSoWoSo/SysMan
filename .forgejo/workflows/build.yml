name: Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: codeberg-medium

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Install CGO dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Download dependencies
        run: go mod download

      - name: Build all GUI binaries
        run: make build

      - name: Build all TUI binaries (CGO-free)
        run: make build-tui
