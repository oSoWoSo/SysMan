name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-linux-amd64:
    runs-on: codeberg-medium

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install CGO dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download dependencies
        run: go mod download

      - name: Build and package all binaries
        run: VERSION=${{ steps.version.outputs.VERSION }} make release

      - name: Create release and upload assets
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          REPO="${{ github.repository }}"
          API="https://codeberg.org/api/v1"

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "${PREV_TAG}" ]; then
            CHANGELOG=$(git log --oneline --no-decorate ${PREV_TAG}..HEAD)
          else
            CHANGELOG="Initial release"
          fi

          curl -s -X POST "${API}/repos/${REPO}/releases" \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${VERSION}\",\"name\":\"${VERSION}\",\"body\":\"${CHANGELOG}\",\"draft\":false}" \
            || true

          for f in build/*.tar.gz build/*.sha256; do
            [ -f "$f" ] || continue
            curl -s -X POST "${API}/repos/${REPO}/releases/tags/${VERSION}/assets" \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              -F "attachment=@${f}"
          done

  release-cross:
    runs-on: codeberg-medium

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: "386"
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
          - goos: openbsd
            goarch: amd64
          - goos: openbsd
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download dependencies
        run: go mod download

      - name: Build TUI binaries (CGO-free)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: make build-tui

      - name: Package TUI binaries
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd build
          for bin in sysman-tui svman-tui ugman-tui infoman-tui srcman-tui pkgman-tui; do
            [ -f "$bin" ] || continue
            name="${bin}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
            cp "$bin" "$name"
            sha256sum "$name" > "${name}.sha256"
            tar czf "${name}.tar.gz" "$name" lang/ 2>/dev/null || tar czf "${name}.tar.gz" "$name"
            rm "$name"
          done

      - name: Upload assets
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          REPO="${{ github.repository }}"
          API="https://codeberg.org/api/v1"

          # Ensure release exists (linux/amd64 job may still be running)
          curl -s -X POST "${API}/repos/${REPO}/releases" \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${VERSION}\",\"name\":\"${VERSION}\",\"draft\":false}" \
            || true

          for f in build/*.tar.gz build/*.sha256; do
            [ -f "$f" ] || continue
            curl -s -X POST "${API}/repos/${REPO}/releases/tags/${VERSION}/assets" \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              -F "attachment=@${f}"
          done
