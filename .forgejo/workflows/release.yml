name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: codeberg-medium

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: 386
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
          - goos: openbsd
            goarch: amd64
          - goos: openbsd
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          NAME=svman-${{ matrix.goos }}-${{ matrix.goarch }}
          mkdir -p build
          go build \
            -ldflags="-s -w -X codeberg.org/oSoWoSo/svman/plugin.Version=${VERSION}" \
            -o build/${NAME} \
            .
          cd build
          sha256sum ${NAME} > ${NAME}.sha256
          tar czf ${NAME}.tar.gz ${NAME}

      - name: Create release and upload assets
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          NAME=svman-${{ matrix.goos }}-${{ matrix.goarch }}
          REPO="${{ github.repository }}"
          API="https://codeberg.org/api/v1"

          # Generate changelog since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "${PREV_TAG}" ]; then
            CHANGELOG=$(git log --oneline --no-decorate ${PREV_TAG}..HEAD)
          else
            CHANGELOG="Initial release"
          fi

          # Create release (ignore error if already exists from another matrix job)
          curl -s -X POST "${API}/repos/${REPO}/releases" \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${VERSION}\",\"name\":\"${VERSION}\",\"body\":\"${CHANGELOG}\",\"draft\":false}" \
            || true

          # Upload assets
          for f in build/${NAME} build/${NAME}.sha256 build/${NAME}.tar.gz; do
            curl -s -X POST "${API}/repos/${REPO}/releases/tags/${VERSION}/assets" \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              -F "attachment=@${f}"
          done
