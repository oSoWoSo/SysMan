name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-linux-amd64:
    runs-on: codeberg-medium

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install CGO dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download dependencies
        run: go mod download

      - name: Build all binaries
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          make build
          make build-tui

      - name: Create per-module tarballs
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd build
          
          # Individual module tarballs (GUI + TUI)
          for module in sysman serman pkgman srcman infman ugsman vmsman; do
            # Check if GUI binary exists
            if [ -f "$module" ]; then
              # Remove any existing directory from previous runs
              rm -rf "$module"
              mkdir -p "$module"
              cp "$module" "$module/" 2>/dev/null || true
              cp "${module}-tui" "$module/" 2>/dev/null || true
              cp -r lang/"$module" "$module/" 2>/dev/null || true
              tar czf "${module}-${VERSION}-linux-amd64.tar.gz" "$module"
              sha256sum "${module}-${VERSION}-linux-amd64.tar.gz" > "${module}-${VERSION}-linux-amd64.tar.gz.sha256"
              rm -rf "$module"
              echo "Created ${module}-${VERSION}-linux-amd64.tar.gz"
            fi
          done
          
          # Create "all" tarball with all binaries
          mkdir -p all
          for f in sysman serman pkgman srcman infman ugsman vmsman; do
            [ -f "$f" ] && cp "$f" all/ 2>/dev/null || true
          done
          for f in sysman-tui serman-tui pkgman-tui srcman-tui infman-tui ugsman-tui vmsman-tui; do
            [ -f "$f" ] && cp "$f" all/ 2>/dev/null || true
          done
          cp -r lang/* all/ 2>/dev/null || true
          tar czf "SysMan-0.014-Alpha-linux-amd64.tar.gz" all/
          sha256sum "SysMan-0.014-Alpha-linux-amd64.tar.gz" > "SysMan-0.014-Alpha-linux-amd64.tar.gz.sha256"
          rm -rf all

      - name: Create release and upload assets
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          REPO="${{ github.repository }}"
          API="https://codeberg.org/api/v1"

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "${PREV_TAG}" ]; then
            CHANGELOG=$(git log --oneline --no-decorate ${PREV_TAG}..HEAD)
          else
            CHANGELOG="Initial release"
          fi

          # Create release with changelog
          curl -s -X POST "${API}/repos/${REPO}/releases" \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${VERSION}\",\"name\":\"${VERSION}\",\"body\":\"${CHANGELOG}\",\"draft\":false}" \
            || true

          # Upload all tarballs and checksums
          for f in build/*.tar.gz build/*.sha256; do
            [ -f "$f" ] || continue
            curl -s -X POST "${API}/repos/${REPO}/releases/tags/${VERSION}/assets" \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              -F "attachment=@${f}"
          done

  release-cross:
    runs-on: codeberg-medium

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: "386"
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
          - goos: openbsd
            goarch: amd64
          - goos: openbsd
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download dependencies
        run: go mod download

      - name: Build TUI binaries (CGO-free)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: make build-tui

      - name: Package TUI binaries
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd build
          for bin in sysman-tui serman-tui ugsman-tui infman-tui srcman-tui pkgman-tui vmsman-tui; do
            [ -f "$bin" ] || continue
            name="${bin}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
            cp "$bin" "$name"
            sha256sum "$name" > "${name}.sha256"
            tar czf "${name}.tar.gz" "$name" lang/ 2>/dev/null || tar czf "${name}.tar.gz" "$name"
            rm "$name"
          done

      - name: Upload assets
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          REPO="${{ github.repository }}"
          API="https://codeberg.org/api/v1"

          # Ensure release exists (linux/amd64 job may still be running)
          curl -s -X POST "${API}/repos/${REPO}/releases" \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${VERSION}\",\"name\":\"${VERSION}\",\"draft\":false}" \
            || true

          for f in build/*.tar.gz build/*.sha256; do
            [ -f "$f" ] || continue
            curl -s -X POST "${API}/repos/${REPO}/releases/tags/${VERSION}/assets" \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              -F "attachment=@${f}"
          done
